<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grand Line Card Vault</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script type="module" src="js/main.js" defer></script>
</head>
<body>
 <header class="site-header">
  <div class="header-left">
    <a href="index.html">
      <img src="images/logo.png" alt="Logo" class="site-logo">
    </a>
    <h1>Grand Line Card Vault</h1>
  </div>
   <nav>
      <a href="index.html">Home</a>
      <a href="favorites.html">Favorites</a>
      <a href="cart.html">Cart</a>
      <a href="collection.html">Collection</a>
    </nav>
</header>

  <main>
  <section class="hero">
    <h2>Browse One Piece Cards and Prices</h2>
    <p>Search cards, save favorites, add items to cart, and build your collection.</p>
  </section>

  <section class="search-section">
    <input type="text" id="searchInput" placeholder="Search card by name..." />
    <button id="searchBtn">Search</button>
    <button id="resetBtn">Reset</button>
  </section>

  <section class="filter-section">
    <select id="sortSelect">
      <option value="default">Sort By</option>
      <option value="name-asc">Name A-Z</option>
      <option value="name-desc">Name Z-A</option>
      <option value="price-low">Price Low to High</option>
      <option value="price-high">Price High to Low</option>
    </select>
  </section>

  <section id="message"></section>

  <section id="cardResults" class="card-grid"></section>

  <section id="pagination" class="pagination"></section>
</main>

  <footer>
    <p>&copy; 2026 Grand Line Card Vault</p>
  </footer>
</body>
</html>
