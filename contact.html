<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Grand Line Card Vault</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/menu.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <a href="index.html">
        <img src="images/logo.png" alt="Grand Line Card Vault logo" class="site-logo">
      </a>
      <h1>Grand Line Card Vault</h1>
    </div>

    <button id="menuBtn" class="menu-btn" aria-label="Open navigation menu" aria-expanded="false">
      ☰
    </button>

    <nav id="mainNav" class="main-nav">
      <a href="index.html">Home</a>
      <a href="favorites.html">Favorites</a>
      <a href="cart.html">Cart</a>
      <a href="collection.html">Collection</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main class="contact-page">
    <section class="contact-box">
      <h2>Contact Us</h2>
      <p>If you have questions, suggestions, or feedback about Grand Line Card Vault, send us a message below.</p>

      <form class="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Grand Line Card Vault</p>
  </footer>
</body>
</html>
